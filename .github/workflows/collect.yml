name: 한컴 KDT 데이터 수집

on:
  schedule:
    # 매일 00:00 UTC = 09:00 KST
    - cron: '0 0 * * *'
  workflow_dispatch: # 수동 실행

permissions:
  contents: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: 의존성 설치
        run: npm ci

      - name: KDT 실적 수집
        env:
          WORK24_API_KEY: ${{ secrets.WORK24_API_KEY }}
        run: npm run collect

      - name: 공고 소식 수집
        env:
          G2B_API_KEY: ${{ secrets.G2B_API_KEY }}
        run: npm run bids
        continue-on-error: true

      - name: 변경사항 커밋 & 푸시
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/courses.json data/bids.json
          if git diff --cached --quiet; then
            echo "변경사항 없음 — 스킵"
          else
            git commit -m "data: $(date -u '+%Y-%m-%d %H:%M') UTC 수집 결과 업데이트"
            git push
          fi
